services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped